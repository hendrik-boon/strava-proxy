name: Deploy Strava Proxy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package*.json'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Cloudflare Workers
        run: |
          # Deploy the worker
          npx wrangler deploy

          # Set secrets
          echo "Setting STRAVA_CLIENT_ID..."
          echo "${{ secrets.STRAVA_CLIENT_ID }}" | npx wrangler secret put STRAVA_CLIENT_ID

          echo "Setting STRAVA_CLIENT_SECRET..."
          echo "${{ secrets.STRAVA_CLIENT_SECRET }}" | npx wrangler secret put STRAVA_CLIENT_SECRET

          echo "Setting STRAVA_REFRESH_TOKEN..."
          echo "${{ secrets.STRAVA_REFRESH_TOKEN }}" | npx wrangler secret put STRAVA_REFRESH_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}